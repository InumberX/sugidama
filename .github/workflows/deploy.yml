name: deploy

on:
  push:
    branches:
      - develop
      - main

# Cancel superseded runs on the same branch so an older deploy cannot
# overwrite a newer one if it finishes later.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  cache-version: v1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ env.cache-version }}-${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.cache-version }}-${{ runner.os }}-npm-

      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ env.cache-version }}-${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.cache-version }}-${{ runner.os }}-npm-

      - run: npm ci
      - run: npm run test -- --run

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    permissions:
      contents: read
    env:
      WRANGLER_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ env.cache-version }}-${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.cache-version }}-${{ runner.os }}-npm-

      - run: npm ci

      - name: Build
        env:
          NODE_ENV: production
          CLOUDFLARE_ENV: ${{ env.WRANGLER_ENV }}
          NO_INDEX: ${{ vars.NO_INDEX }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_NAME: ${{ vars.SITE_NAME }}
          GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
          API_URL: ${{ vars.API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        # Re-export the same build-time vars to wrangler so any deploy-time
        # rebundling (e.g. via @cloudflare/vite-plugin's redirected config)
        # picks up the same values used in the previous Build step.
        env:
          NODE_ENV: production
          CLOUDFLARE_ENV: ${{ env.WRANGLER_ENV }}
          NO_INDEX: ${{ vars.NO_INDEX }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_NAME: ${{ vars.SITE_NAME }}
          GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
          API_URL: ${{ vars.API_URL }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env=${{ env.WRANGLER_ENV }}
